---
security:
    defaultUserRole: ROLE_USER
    accessTokenValiditySeconds:
    refreshTokenValiditySeconds:
    # Per-client token lifetime overrides (optional).
    # When configured, these values take precedence over the global defaults above.
    # By default, values must not exceed the global default (security guard).
    # Set allowClientTokenLifetimeExtension: true only if longer-than-default is explicitly required.
    #
    # Example:
    # allowClientTokenLifetimeExtension: false
    # clientTokenLifetimes:
    #   example-short-lived-client:
    #     accessTokenValiditySeconds: 1800    # 30 minutes
    #     refreshTokenValiditySeconds: 43200  # 12 hours
    #   example-api-client:
    #     accessTokenValiditySeconds: 900     # 15 minutes
    #     # refreshTokenValiditySeconds not set → falls back to global default
registrationCaptchaPeriodSeconds: 21600
